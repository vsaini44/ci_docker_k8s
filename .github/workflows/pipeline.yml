name: Flask DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

env:
  IMAGE_NAME: flask-demo
  DOCKER_REPO: ${{ secrets.DOCKER_USERNAME }}/flask-demo

jobs:

#################################################
# 1️⃣ UNIT TEST JOB
#################################################

  tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install Dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest

      - name: Run Tests
        run: |
          pytest

#################################################
# 2️⃣ DOCKER BUILD + PUSH
#################################################

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: tests

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REPO }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

#################################################
# 3️⃣ SECURITY SCANNING
#################################################

  security:
    name: Scan Docker Image
    runs-on: ubuntu-latest
    needs: build

    steps:

      - name: Scan Image for CVEs
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REPO }}:latest
          severity: CRITICAL,HIGH
          exit-code: 1

#################################################
# 4️⃣ KUBERNETES DEPLOYMENT
#################################################

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: security

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      - name: Deploy Application
        run: |
          kubectl apply -f k8s/deployment.yaml

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/flask-demo

#################################################
# 5️⃣ KUBERNETES SMOKE TEST
#################################################

  smoke-test:
    name: Kubernetes Smoke Test
    runs-on: ubuntu-latest
    needs: deploy

    steps:

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      - name: Verify Pods
        run: |
          kubectl get pods

      - name: Verify Service
        run: |
          kubectl get svc

#################################################
# 6️⃣ PR COMMENT
#################################################

  notify:
    name: Notify PR
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.event_name == 'pull_request'

    steps:

      - name: Comment on Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🚀 CI/CD Pipeline completed successfully!\n\n✔ Tests Passed\n✔ Image Built\n✔ Security Scan Passed\n✔ Kubernetes Deployment Successful"
            })
